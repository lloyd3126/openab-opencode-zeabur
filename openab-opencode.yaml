# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: OpenAB OpenCode
spec:
    description: |
        在 Zeabur 上部署以 OpenCode 為 ACP 後端的 OpenAB。
        這個模板會把 Discord 機器人連到 OpenCode，並讓你在部署後用 OpenCode 登入想使用的模型供應商。
    coverImage: https://cdn-console.zeabur.com/f/Xp0H6/openab-cover.webp
    icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
    variables:
        - key: DISCORD_BOT_TOKEN
          type: STRING
          name: Discord Bot Token
          description: 從 Discord 開發者平台取得的機器人 Token。
        - key: OPENAB_ALLOWED_CHANNELS
          type: STRING
          name: 允許的 Discord 頻道 ID
          description: 選填。以逗號分隔可互動的頻道 ID；留空則允許所有頻道。
        - key: OPENAB_ALLOWED_USERS
          type: STRING
          name: 允許的 Discord 使用者 ID
          description: 選填。以逗號分隔可互動的使用者 ID；留空則允許頻道中的所有人。
        - key: OPENCODE_MODEL
          type: STRING
          name: 預設 OpenCode 模型
          description: '選填。啟動時會同步到 /home/node/opencode.json，格式為 provider/model，例如 ollama-cloud/gemini-3-flash-preview'
        - key: OPENROUTER_API_KEY
          type: STRING
          name: OpenRouter API Key
          description: 選填。若使用 OpenRouter 模型，可直接填入 API key，讓 OpenCode 在啟動時自動讀取，不需要手動登入。
    tags:
        - AI
        - Developer Tools
        - Discord
    readme: |
        # OpenAB OpenCode

        這個模板會在 Zeabur 上部署 [OpenAB](https://github.com/openabdev/openab) 的 `openab-opencode` 映像。OpenAB 會透過 ACP 把 Discord 對話連到 [OpenCode](https://github.com/openabdev/openab/blob/main/docs/opencode.md)，你可以在部署後自行登入要使用的模型供應商。

        ## 你會得到什麼

        - 以 `ghcr.io/openabdev/openab-opencode:0.7.7` 為基礎的 Discord Bot 服務
        - 掛載在 `/home/node` 的持久化儲存，保存 OpenCode 登入狀態、OpenAB 設定與工作檔案
        - 可選的 `OPENCODE_MODEL`，啟動時會自動同步到 `/home/node/workspace/opencode.json`
        - 首次啟動時會建立 `/home/node/workspace` 與 `AGENTS.md`、`TOOLS.md`、`USER.md`、`IDENTITY.md`、`SOUL.md`
        - `TOOLS.md`、`USER.md`、`IDENTITY.md`、`SOUL.md` 會透過 `opencode.json` 的 `instructions` 載入
        - 已預裝 `gh`，方便代理在容器內操作 GitHub

        ## 部署前準備

        1. 到 [Discord Developer Portal](https://discord.com/developers/applications) 建立 Discord Application 與 Bot
        2. 啟用 **Message Content Intent**
        3. 邀請 Bot 進入伺服器，建議勾選這些權限：
           - `檢視頻道`
           - `傳送訊息`
           - `建立公開討論串`
           - `在討論串中傳送訊息`
           - `讀取訊息歷史記錄`
           - `新增反應`
           - `管理訊息`
        4. 複製 Bot Token；若要限制頻道，再另外複製頻道 ID

        ## 部署方式

        請填入：

        - `DISCORD_BOT_TOKEN`：必填
        - `OPENAB_ALLOWED_CHANNELS`：選填
        - `OPENAB_ALLOWED_USERS`：選填
        - `OPENCODE_MODEL`：選填，格式為 `provider/model`
        - `OPENROUTER_API_KEY`：選填，若模型是 `openrouter/...` 建議一併填入

        如果 `DISCORD_BOT_TOKEN` 留空，服務會進入睡眠而不會直接崩潰。

        ## 部署後設定

        如果你使用的是 `openrouter/...` 模型，而且已填入 `OPENROUTER_API_KEY`，通常不需要再手動執行 provider 登入。

        在 Zeabur 的 Terminal 中執行：

        ```bash
        opencode auth login
        ```

        完成供應商登入流程後，重新啟動服務一次。

        如果之後想改預設模型，直接更新 `OPENCODE_MODEL` 並重啟 service 即可。模板會在啟動時自動同步 `/home/node/workspace/opencode.json`，並保留 workspace 規則檔的 `instructions` 設定。

        如果你要手動覆寫：

        ```bash
        echo '{"$schema":"https://opencode.ai/config.json","model":"ollama-cloud/gemini-3-flash-preview"}' > /home/node/workspace/opencode.json
        ```

        修改後請重新啟動服務。

        ## 使用方式

        - 在允許的 Discord 頻道中 @ 機器人開始對話
        - 後續對話會在 Bot 建立的 thread 中持續進行
        - Agent 會以 `/home/node/workspace` 作為工作目錄，並讀取其中的工作區檔案
        - 可在容器內執行 `opencode models` 查看已登入供應商可用的模型

        ## 持久化檔案

        | 檔案 | 用途 |
        |------|------|
        | `/home/node/.config/openab/config.toml` | 首次啟動時生成的 OpenAB 執行設定 |
        | `/home/node/workspace/opencode.json` | OpenCode 的專案設定，包含預設模型與 `instructions` 載入清單 |
        | `/home/node/workspace/AGENTS.md` | 工作區主規則，定義 agent 在這個專案中的工作方式 |
        | `/home/node/workspace/TOOLS.md` | 本機工具、Zeabur 與 GitHub 操作相關的環境備註 |
        | `/home/node/workspace/USER.md` | 使用者偏好與合作方式備註 |
        | `/home/node/workspace/IDENTITY.md` | 這個 agent 的角色定位與身份描述 |
        | `/home/node/workspace/SOUL.md` | 這個 agent 的語氣、價值觀與邊界設定 |

        如需重新生成 OpenAB 設定：

        ```bash
        rm /home/node/.config/openab/config.toml
        ```

        如果 `OPENCODE_MODEL` 有值，重啟時會自動把 `/home/node/opencode.json` 的 model 同步成該值。

        ## GitHub 驗證

        映像內已包含 GitHub CLI。你可以在 Discord 中要求 Bot 登入 GitHub，並完成回覆中的 device flow。

        ## 授權與歸屬

        OpenAB 由 [openabdev/openab](https://github.com/openabdev/openab) 維護，使用 [MIT License](https://github.com/openabdev/openab/blob/main/LICENSE) 發佈。
        本模板中的 OpenCode 設定方式依據官方 [OpenCode guide](https://github.com/openabdev/openab/blob/main/docs/opencode.md) 整理。
    resourceRequirement:
        minConfig:
            cpu: 2
            ram: 4
        recommendedConfig:
            cpu: 4
            ram: 8
    services:
        - name: openab
          icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
          template: PREBUILT_V2
          spec:
            id: openab
            source:
                image: ghcr.io/openabdev/openab-opencode:0.7.7
                command:
                    - /bin/sh
                    - -c
                    - /opt/start-openab.sh
            volumes:
                - id: node-home
                  dir: /home/node
            env:
                DISCORD_BOT_TOKEN:
                    default: ${DISCORD_BOT_TOKEN}
                OPENAB_ALLOWED_CHANNELS:
                    default: ${OPENAB_ALLOWED_CHANNELS}
                OPENAB_ALLOWED_USERS:
                    default: ${OPENAB_ALLOWED_USERS}
                OPENCODE_MODEL:
                    default: ${OPENCODE_MODEL}
                OPENROUTER_API_KEY:
                    default: ${OPENROUTER_API_KEY}
            configs:
                - path: /opt/start-openab.sh
                  template: |
                    #!/bin/sh
                    set -e

                    # Initialize shell config on first boot (volume is empty)
                    if [ ! -f /home/node/.bashrc ]; then
                      cp /etc/skel/.bashrc /etc/skel/.profile /etc/skel/.bash_logout /home/node/ 2>/dev/null || true
                    fi

                    # Fix ownership for persistent volume
                    chown -R node:node /home/node
                    chmod 755 /home/node/.config 2>/dev/null || true

                    if [ -z "$DISCORD_BOT_TOKEN" ]; then
                      echo "openab: DISCORD_BOT_TOKEN not set — sleeping"
                      exec sleep infinity
                    fi

                    CONFIG_DIR=/home/node/.config/openab
                    CONFIG_FILE=$CONFIG_DIR/config.toml
                    WORKSPACE_DIR=/home/node/workspace
                    mkdir -p "$CONFIG_DIR"
                    mkdir -p "$WORKSPACE_DIR"

                    # Generate config.toml on first boot only.
                    # openab expands ${VAR} at runtime from process env.
                    if [ ! -f "$CONFIG_FILE" ]; then
                      cp /opt/config.toml.template "$CONFIG_FILE"

                      if [ -n "$OPENAB_ALLOWED_CHANNELS" ]; then
                        IFS=','; channels=""; for id in $OPENAB_ALLOWED_CHANNELS; do
                          id=$(echo "$id" | tr -d ' '); [ -n "$id" ] && channels="${channels}\"${id}\","; done; unset IFS
                        sed -i "/^\[discord\]/a allowed_channels = [$(echo "$channels" | sed 's/,$//')]" "$CONFIG_FILE"
                      fi
                      if [ -n "$OPENAB_ALLOWED_USERS" ]; then
                        IFS=','; users=""; for id in $OPENAB_ALLOWED_USERS; do
                          id=$(echo "$id" | tr -d ' '); [ -n "$id" ] && users="${users}\"${id}\","; done; unset IFS
                        sed -i "/^\[discord\]/a allowed_users = [$(echo "$users" | sed 's/,$//')]" "$CONFIG_FILE"
                      fi

                      echo "openab: config.toml generated"
                    else
                      echo "openab: using existing config.toml (delete to regenerate)"
                    fi

                    if [ ! -f "$WORKSPACE_DIR/AGENTS.md" ]; then
                      cat > "$WORKSPACE_DIR/AGENTS.md" <<'EOF'
                    # AGENTS.md

                    This workspace belongs to an OpenAB bot running on Zeabur with OpenCode as the ACP backend.

                    ## Core Role

                    You help maintain and operate this deployment through Discord conversations.
                    Be practical, concise, and action-oriented.

                    ## Workspace Rules

                    - Prefer Traditional Chinese unless the user clearly asks for another language.
                    - Treat this workspace as persistent operational context for the deployed bot.
                    - When discussing Zeabur, GitHub, Discord, or OpenRouter settings, prefer exact names and concrete steps.
                    - Before destructive actions, explain the impact and ask for confirmation.
                    - Keep answers implementation-focused rather than abstract.

                    ## Workspace Maintenance

                    Maintain the following files when the information is durable and useful beyond the current reply.

                    - Update `TOOLS.md` when you learn stable facts about the environment, deployment, integrations, file locations, commands, or operational workflows.
                    - Update `USER.md` when you learn long-term user preferences such as language, communication style, recurring goals, or collaboration preferences.
                    - Update `IDENTITY.md` only when the intended role or responsibility of this agent changes in a meaningful way.
                    - Update `SOUL.md` only when the desired tone, values, or behavioral boundaries are explicitly refined.

                    ## Update Rules

                    - Do not update these files for temporary, situational, or low-confidence details.
                    - Prefer small edits that preserve existing useful context.
                    - If new information conflicts with older notes, replace the stale part instead of appending both versions.
                    - Mention in your reply when you update one of these files.
                    - If no durable knowledge was gained, leave the files unchanged.
                    EOF
                      echo "openab: workspace AGENTS.md created"
                    fi

                    if [ ! -f "$WORKSPACE_DIR/TOOLS.md" ]; then
                      cat > "$WORKSPACE_DIR/TOOLS.md" <<'EOF'
                    # TOOLS.md

                    ## Local Environment Notes

                    - Persistent home: `/home/node`
                    - Workspace root: `/home/node/workspace`
                    - OpenAB config: `/home/node/.config/openab/config.toml`
                    - OpenCode config: `/home/node/opencode.json`
                    - GitHub CLI: `gh`

                    ## Deployment Notes

                    - `OPENCODE_MODEL` is synced into `/home/node/opencode.json` on startup when set.
                    - `OPENROUTER_API_KEY` can be provided through environment variables for `openrouter/...` models.
                    - Zeabur environment variable changes require a service restart to take effect.
                    EOF
                      echo "openab: workspace TOOLS.md created"
                    fi

                    if [ ! -f "$WORKSPACE_DIR/USER.md" ]; then
                      cat > "$WORKSPACE_DIR/USER.md" <<'EOF'
                    # USER.md

                    ## Maintainer Profile

                    - Preferred language: Traditional Chinese
                    - Typical tasks: Zeabur deployment, GitHub operations, Discord bot setup, model configuration
                    - Preferred collaboration style: practical suggestions, direct answers, low ceremony
                    EOF
                      echo "openab: workspace USER.md created"
                    fi

                    if [ ! -f "$WORKSPACE_DIR/IDENTITY.md" ]; then
                      cat > "$WORKSPACE_DIR/IDENTITY.md" <<'EOF'
                    # IDENTITY.md

                    You are the operational agent for this OpenAB deployment.
                    Your job is to help manage the Discord bot environment, explain configuration clearly, and support ongoing maintenance.
                    EOF
                      echo "openab: workspace IDENTITY.md created"
                    fi

                    if [ ! -f "$WORKSPACE_DIR/SOUL.md" ]; then
                      cat > "$WORKSPACE_DIR/SOUL.md" <<'EOF'
                    # SOUL.md

                    ## Style

                    - Calm
                    - Practical
                    - Supportive
                    - Precise

                    ## Values

                    - Prefer clarity over flourish.
                    - Prefer correct operational guidance over guesswork.
                    - Keep the bot useful for real deployment work.
                    EOF
                      echo "openab: workspace SOUL.md created"
                    fi

                    current_model=""
                    needs_opencode_sync=0
                    if [ -f /home/node/opencode.json ]; then
                      current_model=$(sed -n 's/.*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$WORKSPACE_DIR/opencode.json" | head -n 1)
                      for instruction_file in TOOLS.md USER.md IDENTITY.md SOUL.md; do
                        if ! grep -q "\"$instruction_file\"" "$WORKSPACE_DIR/opencode.json" 2>/dev/null; then
                          needs_opencode_sync=1
                        fi
                      done
                    else
                      needs_opencode_sync=1
                    fi

                    if [ -n "$OPENCODE_MODEL" ] && [ "$current_model" != "$OPENCODE_MODEL" ]; then
                      needs_opencode_sync=1
                    fi

                    if [ "$needs_opencode_sync" -eq 1 ]; then
                      {
                        printf '{\n'
                        printf '  "$schema": "https://opencode.ai/config.json"'
                        if [ -n "$OPENCODE_MODEL" ]; then
                          printf ',\n  "model": "%s"' "$OPENCODE_MODEL"
                        fi
                        printf ',\n  "instructions": [\n'
                        printf '    "TOOLS.md",\n'
                        printf '    "USER.md",\n'
                        printf '    "IDENTITY.md",\n'
                        printf '    "SOUL.md"\n'
                        printf '  ]\n'
                        printf '}\n'
                      } > "$WORKSPACE_DIR/opencode.json"
                      echo "openab: opencode.json synced with workspace instructions"
                    fi

                    chown -R node:node "$CONFIG_DIR" "$WORKSPACE_DIR" "$WORKSPACE_DIR/opencode.json" 2>/dev/null || true
                    exec runuser -u node --preserve-environment -- openab run "$CONFIG_FILE"
                  permission: 493
                  envsubst: null
                - path: /opt/config.toml.template
                  template: |
                    [discord]
                    bot_token = "${DISCORD_BOT_TOKEN}"

                    [agent]
                    command = "opencode"
                    args = ["acp"]
                    working_dir = "/home/node/workspace"
                  permission: null
                  envsubst: null
localization:
    en-US:
        description: |
            Deploy OpenAB with OpenCode as the ACP backend on Zeabur.
            This template connects a Discord bot to OpenCode and lets you choose your own LLM provider through OpenCode auth.
        variables:
            - key: DISCORD_BOT_TOKEN
              type: STRING
              name: Discord Bot Token
              description: Token from the Discord Developer Portal for your bot application.
            - key: OPENAB_ALLOWED_CHANNELS
              type: STRING
              name: Allowed Discord Channel IDs
              description: Optional. Comma-separated channel IDs that the bot is allowed to listen in. Leave empty to allow all channels.
            - key: OPENAB_ALLOWED_USERS
              type: STRING
              name: Allowed Discord User IDs
              description: Optional. Comma-separated user IDs that can interact with the bot. Leave empty to allow everyone in allowed channels.
            - key: OPENCODE_MODEL
              type: STRING
              name: Default OpenCode Model
              description: 'Optional. Provider/model format synced to /home/node/opencode.json during startup. Example: ollama-cloud/gemini-3-flash-preview'
            - key: OPENROUTER_API_KEY
              type: STRING
              name: OpenRouter API Key
              description: Optional. If you use an `openrouter/...` model, provide the API key so OpenCode can load it from environment variables without manual login.
        readme: |
            # OpenAB OpenCode

            This template deploys [OpenAB](https://github.com/openabdev/openab) with the `openab-opencode` image on Zeabur. OpenAB connects Discord conversations to [OpenCode](https://github.com/openabdev/openab/blob/main/docs/opencode.md) through ACP, so you can authenticate the provider you want after deployment.

            ## What You Get

            - A Discord bot service backed by `ghcr.io/openabdev/openab-opencode:0.7.7`
            - Persistent storage at `/home/node` for OpenCode auth, OpenAB config, and project files
            - Optional startup sync from `OPENCODE_MODEL` into `/home/node/workspace/opencode.json`
            - Automatic workspace scaffolding in `/home/node/workspace` with `AGENTS.md`, `TOOLS.md`, `USER.md`, `IDENTITY.md`, and `SOUL.md`
            - `TOOLS.md`, `USER.md`, `IDENTITY.md`, and `SOUL.md` are loaded through `instructions` in `opencode.json`
            - `gh` preinstalled for GitHub workflows inside the agent environment

            ## Before You Deploy

            1. Create a Discord application and bot at [Discord Developer Portal](https://discord.com/developers/applications)
            2. Enable **Message Content Intent**
            3. Invite the bot with these recommended permissions:
               - `View Channels`
               - `Send Messages`
               - `Create Public Threads`
               - `Send Messages in Threads`
               - `Read Message History`
               - `Add Reactions`
               - `Manage Messages`
            4. Copy the bot token and, if needed, the channel IDs you want to restrict

            ## Deploy

            Fill in:

            - `DISCORD_BOT_TOKEN`: required
            - `OPENAB_ALLOWED_CHANNELS`: optional
            - `OPENAB_ALLOWED_USERS`: optional
            - `OPENCODE_MODEL`: optional default model in `provider/model` format
            - `OPENROUTER_API_KEY`: optional but recommended for `openrouter/...` models

            If `DISCORD_BOT_TOKEN` is empty, the service stays asleep instead of crashing.

            ## After Deployment

            If you are using an `openrouter/...` model and have already set `OPENROUTER_API_KEY`, you usually do not need to run manual provider login.

            Open the Zeabur terminal for the service and run:

            ```bash
            opencode auth login
            ```

            Finish the provider login flow, then restart the service once.

            If you want to change the default model later, update `OPENCODE_MODEL` and restart the service. The template will sync `/home/node/workspace/opencode.json` automatically on startup while keeping the workspace instruction references.

            If you prefer to override it manually:

            ```bash
            echo '{"$schema":"https://opencode.ai/config.json","model":"ollama-cloud/gemini-3-flash-preview"}' > /home/node/workspace/opencode.json
            ```

            Restart the service after editing the file.

            ## Usage

            - Mention the bot in an allowed Discord channel to start a conversation
            - Follow-up messages continue inside the created Discord thread
            - The agent uses `/home/node/workspace` as its working directory and reads the workspace files stored there
            - Use `opencode models` in the container to inspect available models from authenticated providers

            ## Persistent Files

            | File | Purpose |
            |------|---------|
            | `/home/node/.config/openab/config.toml` | OpenAB runtime config generated on first boot |
            | `/home/node/workspace/opencode.json` | OpenCode project-level config, including the default model and `instructions` list |
            | `/home/node/workspace/AGENTS.md` | Main workspace instructions that define how the agent should operate |
            | `/home/node/workspace/TOOLS.md` | Local notes about tools, Zeabur behavior, and GitHub workflows |
            | `/home/node/workspace/USER.md` | Notes about the human maintainer and collaboration preferences |
            | `/home/node/workspace/IDENTITY.md` | The agent's role and identity within this deployment |
            | `/home/node/workspace/SOUL.md` | The agent's style, values, and boundaries |

            To regenerate the OpenAB config:

            ```bash
            rm /home/node/.config/openab/config.toml
            ```

            If `OPENCODE_MODEL` is set, startup will automatically sync the model in `/home/node/opencode.json`.

            ## GitHub Authentication

            The image includes GitHub CLI. In Discord, ask the bot to log in to GitHub and complete the device flow shown in the reply.

            ## License And Attribution

            OpenAB is maintained by [openabdev/openab](https://github.com/openabdev/openab) and distributed under the [MIT License](https://github.com/openabdev/openab/blob/main/LICENSE).
            OpenCode setup guidance in this template is based on the official [OpenCode guide](https://github.com/openabdev/openab/blob/main/docs/opencode.md).
