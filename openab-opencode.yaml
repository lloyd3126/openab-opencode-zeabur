# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: OpenAB OpenCode
spec:
    description: |
        在 Zeabur 上部署以 OpenCode 為 ACP 後端的 OpenAB。
        這個模板會把 Discord 機器人連到 OpenCode，並讓你在部署後用 OpenCode 登入想使用的模型供應商。
    coverImage: https://cdn-console.zeabur.com/f/Xp0H6/openab-cover.webp
    icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
    variables:
        - key: DISCORD_BOT_TOKEN
          type: STRING
          name: Discord Bot Token
          description: 從 Discord 開發者平台取得的機器人 Token。
        - key: OPENAB_ALLOWED_CHANNELS
          type: STRING
          name: 允許的 Discord 頻道 ID
          description: 選填。以逗號分隔可互動的頻道 ID；留空則允許所有頻道。
        - key: OPENAB_ALLOWED_USERS
          type: STRING
          name: 允許的 Discord 使用者 ID
          description: 選填。以逗號分隔可互動的使用者 ID；留空則允許頻道中的所有人。
        - key: OPENCODE_MODEL
          type: STRING
          name: 預設 OpenCode 模型
          description: '選填。啟動時會同步到 /home/node/opencode.json，格式為 provider/model，例如 ollama-cloud/gemini-3-flash-preview'
    tags:
        - AI
        - Developer Tools
        - Discord
    readme: |
        # OpenAB OpenCode

        這個模板會在 Zeabur 上部署 [OpenAB](https://github.com/openabdev/openab) 的 `openab-opencode` 映像。OpenAB 會透過 ACP 把 Discord 對話連到 [OpenCode](https://github.com/openabdev/openab/blob/main/docs/opencode.md)，你可以在部署後自行登入要使用的模型供應商。

        ## 你會得到什麼

        - 以 `ghcr.io/openabdev/openab-opencode:0.7.7` 為基礎的 Discord Bot 服務
        - 掛載在 `/home/node` 的持久化儲存，保存 OpenCode 登入狀態、OpenAB 設定與工作檔案
        - 可選的 `OPENCODE_MODEL`，啟動時會自動同步到 `/home/node/opencode.json`
        - 已預裝 `gh`，方便代理在容器內操作 GitHub

        ## 部署前準備

        1. 到 [Discord Developer Portal](https://discord.com/developers/applications) 建立 Discord Application 與 Bot
        2. 啟用 **Message Content Intent**
        3. 邀請 Bot 進入伺服器，建議勾選這些權限：
           - `檢視頻道`
           - `傳送訊息`
           - `建立公開討論串`
           - `在討論串中傳送訊息`
           - `讀取訊息歷史記錄`
           - `新增反應`
           - `管理訊息`
        4. 複製 Bot Token；若要限制頻道，再另外複製頻道 ID

        ## 部署方式

        請填入：

        - `DISCORD_BOT_TOKEN`：必填
        - `OPENAB_ALLOWED_CHANNELS`：選填
        - `OPENAB_ALLOWED_USERS`：選填
        - `OPENCODE_MODEL`：選填，格式為 `provider/model`

        如果 `DISCORD_BOT_TOKEN` 留空，服務會進入睡眠而不會直接崩潰。

        ## 部署後設定

        在 Zeabur 的 Terminal 中執行：

        ```bash
        opencode auth login
        ```

        完成供應商登入流程後，重新啟動服務一次。

        如果之後想改預設模型，直接更新 `OPENCODE_MODEL` 並重啟 service 即可。模板會在啟動時自動同步 `/home/node/opencode.json`。

        如果你要手動覆寫：

        ```bash
        echo '{"$schema":"https://opencode.ai/config.json","model":"ollama-cloud/gemini-3-flash-preview"}' > /home/node/opencode.json
        ```

        修改後請重新啟動服務。

        ## 使用方式

        - 在允許的 Discord 頻道中 @ 機器人開始對話
        - 後續對話會在 Bot 建立的 thread 中持續進行
        - 可在容器內執行 `opencode models` 查看已登入供應商可用的模型

        ## 持久化檔案

        | 檔案 | 用途 |
        |------|------|
        | `/home/node/.config/openab/config.toml` | 首次啟動時生成的 OpenAB 執行設定 |
        | `/home/node/opencode.json` | OpenCode 的專案設定，包含預設模型 |

        如需重新生成 OpenAB 設定：

        ```bash
        rm /home/node/.config/openab/config.toml
        ```

        如果 `OPENCODE_MODEL` 有值，重啟時會自動把 `/home/node/opencode.json` 的 model 同步成該值。

        ## GitHub 驗證

        映像內已包含 GitHub CLI。你可以在 Discord 中要求 Bot 登入 GitHub，並完成回覆中的 device flow。

        ## 授權與歸屬

        OpenAB 由 [openabdev/openab](https://github.com/openabdev/openab) 維護，使用 [MIT License](https://github.com/openabdev/openab/blob/main/LICENSE) 發佈。
        本模板中的 OpenCode 設定方式依據官方 [OpenCode guide](https://github.com/openabdev/openab/blob/main/docs/opencode.md) 整理。
    resourceRequirement:
        minConfig:
            cpu: 2
            ram: 4
        recommendedConfig:
            cpu: 4
            ram: 8
    services:
        - name: openab
          icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
          template: PREBUILT_V2
          spec:
            id: openab
            source:
                image: ghcr.io/openabdev/openab-opencode:0.7.7
                command:
                    - /bin/sh
                    - -c
                    - /opt/start-openab.sh
            volumes:
                - id: node-home
                  dir: /home/node
            env:
                DISCORD_BOT_TOKEN:
                    default: ${DISCORD_BOT_TOKEN}
                OPENAB_ALLOWED_CHANNELS:
                    default: ${OPENAB_ALLOWED_CHANNELS}
                OPENAB_ALLOWED_USERS:
                    default: ${OPENAB_ALLOWED_USERS}
                OPENCODE_MODEL:
                    default: ${OPENCODE_MODEL}
            configs:
                - path: /opt/start-openab.sh
                  template: |
                    #!/bin/sh
                    set -e

                    # Initialize shell config on first boot (volume is empty)
                    if [ ! -f /home/node/.bashrc ]; then
                      cp /etc/skel/.bashrc /etc/skel/.profile /etc/skel/.bash_logout /home/node/ 2>/dev/null || true
                    fi

                    # Fix ownership for persistent volume
                    chown -R node:node /home/node
                    chmod 755 /home/node/.config 2>/dev/null || true

                    if [ -z "$DISCORD_BOT_TOKEN" ]; then
                      echo "openab: DISCORD_BOT_TOKEN not set — sleeping"
                      exec sleep infinity
                    fi

                    CONFIG_DIR=/home/node/.config/openab
                    CONFIG_FILE=$CONFIG_DIR/config.toml
                    mkdir -p "$CONFIG_DIR"

                    # Generate config.toml on first boot only.
                    # openab expands ${VAR} at runtime from process env.
                    if [ ! -f "$CONFIG_FILE" ]; then
                      cp /opt/config.toml.template "$CONFIG_FILE"

                      if [ -n "$OPENAB_ALLOWED_CHANNELS" ]; then
                        IFS=','; channels=""; for id in $OPENAB_ALLOWED_CHANNELS; do
                          id=$(echo "$id" | tr -d ' '); [ -n "$id" ] && channels="${channels}\"${id}\","; done; unset IFS
                        sed -i "/^\[discord\]/a allowed_channels = [$(echo "$channels" | sed 's/,$//')]" "$CONFIG_FILE"
                      fi
                      if [ -n "$OPENAB_ALLOWED_USERS" ]; then
                        IFS=','; users=""; for id in $OPENAB_ALLOWED_USERS; do
                          id=$(echo "$id" | tr -d ' '); [ -n "$id" ] && users="${users}\"${id}\","; done; unset IFS
                        sed -i "/^\[discord\]/a allowed_users = [$(echo "$users" | sed 's/,$//')]" "$CONFIG_FILE"
                      fi

                      echo "openab: config.toml generated"
                    else
                      echo "openab: using existing config.toml (delete to regenerate)"
                    fi

                    if [ -n "$OPENCODE_MODEL" ]; then
                      current_model=""
                      if [ -f /home/node/opencode.json ]; then
                        current_model=$(sed -n 's/.*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /home/node/opencode.json | head -n 1)
                      fi

                      if [ ! -f /home/node/opencode.json ] || [ "$current_model" != "$OPENCODE_MODEL" ]; then
                        printf '{\n  "$schema": "https://opencode.ai/config.json",\n  "model": "%s"\n}\n' "$OPENCODE_MODEL" > /home/node/opencode.json
                        echo "openab: opencode.json synced from OPENCODE_MODEL"
                      fi
                    fi

                    chown -R node:node "$CONFIG_DIR" /home/node/opencode.json 2>/dev/null || true
                    exec runuser -u node --preserve-environment -- openab run "$CONFIG_FILE"
                  permission: 493
                  envsubst: null
                - path: /opt/config.toml.template
                  template: |
                    [discord]
                    bot_token = "${DISCORD_BOT_TOKEN}"

                    [agent]
                    command = "opencode"
                    args = ["acp"]
                    working_dir = "/home/node"
                  permission: null
                  envsubst: null
localization:
    en-US:
        description: |
            Deploy OpenAB with OpenCode as the ACP backend on Zeabur.
            This template connects a Discord bot to OpenCode and lets you choose your own LLM provider through OpenCode auth.
        variables:
            - key: DISCORD_BOT_TOKEN
              type: STRING
              name: Discord Bot Token
              description: Token from the Discord Developer Portal for your bot application.
            - key: OPENAB_ALLOWED_CHANNELS
              type: STRING
              name: Allowed Discord Channel IDs
              description: Optional. Comma-separated channel IDs that the bot is allowed to listen in. Leave empty to allow all channels.
            - key: OPENAB_ALLOWED_USERS
              type: STRING
              name: Allowed Discord User IDs
              description: Optional. Comma-separated user IDs that can interact with the bot. Leave empty to allow everyone in allowed channels.
            - key: OPENCODE_MODEL
              type: STRING
              name: Default OpenCode Model
              description: 'Optional. Provider/model format synced to /home/node/opencode.json during startup. Example: ollama-cloud/gemini-3-flash-preview'
        readme: |
            # OpenAB OpenCode

            This template deploys [OpenAB](https://github.com/openabdev/openab) with the `openab-opencode` image on Zeabur. OpenAB connects Discord conversations to [OpenCode](https://github.com/openabdev/openab/blob/main/docs/opencode.md) through ACP, so you can authenticate the provider you want after deployment.

            ## What You Get

            - A Discord bot service backed by `ghcr.io/openabdev/openab-opencode:0.7.7`
            - Persistent storage at `/home/node` for OpenCode auth, OpenAB config, and project files
            - Optional startup sync from `OPENCODE_MODEL` into `/home/node/opencode.json`
            - `gh` preinstalled for GitHub workflows inside the agent environment

            ## Before You Deploy

            1. Create a Discord application and bot at [Discord Developer Portal](https://discord.com/developers/applications)
            2. Enable **Message Content Intent**
            3. Invite the bot with these recommended permissions:
               - `View Channels`
               - `Send Messages`
               - `Create Public Threads`
               - `Send Messages in Threads`
               - `Read Message History`
               - `Add Reactions`
               - `Manage Messages`
            4. Copy the bot token and, if needed, the channel IDs you want to restrict

            ## Deploy

            Fill in:

            - `DISCORD_BOT_TOKEN`: required
            - `OPENAB_ALLOWED_CHANNELS`: optional
            - `OPENAB_ALLOWED_USERS`: optional
            - `OPENCODE_MODEL`: optional default model in `provider/model` format

            If `DISCORD_BOT_TOKEN` is empty, the service stays asleep instead of crashing.

            ## After Deployment

            Open the Zeabur terminal for the service and run:

            ```bash
            opencode auth login
            ```

            Finish the provider login flow, then restart the service once.

            If you want to change the default model later, update `OPENCODE_MODEL` and restart the service. The template will sync `/home/node/opencode.json` automatically on startup.

            If you prefer to override it manually:

            ```bash
            echo '{"$schema":"https://opencode.ai/config.json","model":"ollama-cloud/gemini-3-flash-preview"}' > /home/node/opencode.json
            ```

            Restart the service after editing the file.

            ## Usage

            - Mention the bot in an allowed Discord channel to start a conversation
            - Follow-up messages continue inside the created Discord thread
            - Use `opencode models` in the container to inspect available models from authenticated providers

            ## Persistent Files

            | File | Purpose |
            |------|---------|
            | `/home/node/.config/openab/config.toml` | OpenAB runtime config generated on first boot |
            | `/home/node/opencode.json` | OpenCode project-level config, including the default model |

            To regenerate the OpenAB config:

            ```bash
            rm /home/node/.config/openab/config.toml
            ```

            If `OPENCODE_MODEL` is set, startup will automatically sync the model in `/home/node/opencode.json`.

            ## GitHub Authentication

            The image includes GitHub CLI. In Discord, ask the bot to log in to GitHub and complete the device flow shown in the reply.

            ## License And Attribution

            OpenAB is maintained by [openabdev/openab](https://github.com/openabdev/openab) and distributed under the [MIT License](https://github.com/openabdev/openab/blob/main/LICENSE).
            OpenCode setup guidance in this template is based on the official [OpenCode guide](https://github.com/openabdev/openab/blob/main/docs/opencode.md).
